  .legend { display: flex; gap: 1.5rem; margin-bottom: 1rem; font-size: 12px; color: var(--muted); }

  .dot { width: 10px; height: 10px; border-radius: 2px; }
</style>

const colFor = i => {
  if (highSet.has(i)) return { body: '#1D9E75', wick: '#0F6E56' };
  if (lowSet.has(i))  return { body: '#D85A30', wick: '#993C1D' };
  return { body: '#5F5E5A', wick: '#444441' };
};

const candlestickPlugin = {
  id: 'cs',
  afterDatasetsDraw(chart) {
    const { ctx, scales: { x, y } } = chart;
    const bw = Math.max((x.getPixelForValue(1) - x.getPixelForValue(0)) * 0.65, 2);
    candles.forEach((d, i) => {
      const xp  = x.getPixelForValue(i);
      const col = colFor(i);
      const yO  = y.getPixelForValue(d.o);
      const yC  = y.getPixelForValue(d.c);
      const yH  = y.getPixelForValue(d.h);
      const yL  = y.getPixelForValue(d.l);
      ctx.strokeStyle = col.wick; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(xp, yH); ctx.lineTo(xp, yL); ctx.stroke();
      ctx.fillStyle = col.body;
      ctx.fillRect(xp - bw / 2, Math.min(yO, yC), bw, Math.max(Math.abs(yC - yO), 1));
    });
  }
};
